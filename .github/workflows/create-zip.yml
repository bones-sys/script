# .github/workflows/create-zip.yml
name: Create ZIP for each folder

on:
  push:
    branches: [master]
    paths-ignore:
      - "zip/**"
  workflow_dispatch:

jobs:
  create-zip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create ZIP files
        run: |
          # 除外するフォルダ
          EXCLUDE_DIRS=".vscode user_tasks .git .github zip"

          # zipフォルダをクリーンアップ
          rm -rf zip

          # ルート直下のフォルダを取得
          for dir in */; do
            dir_name="${dir%/}"

            # 除外フォルダをスキップ
            skip=false
            for exclude in $EXCLUDE_DIRS; do
              if [ "$dir_name" = "$exclude" ]; then
                skip=true
                break
              fi
            done

            if [ "$skip" = true ]; then
              echo "Skipping: $dir_name"
              continue
            fi

            # フォルダ内にファイルがあるか確認（再帰）
            if find "$dir_name" -type f -print -quit | grep -q .; then
              echo "Processing: $dir_name"

              # 出力先フォルダを作成
              mkdir -p "zip/$dir_name"

              # 1. フォルダ全体のzip（全ファイルをまとめる）
              cd "$dir_name"
              zip -r "../zip/$dir_name/${dir_name}.zip" .
              cd ..

              # 2. 個別ファイルのzip（再帰）
              while IFS= read -r file_path; do
                rel_path="${file_path#${dir_name}/}"
                base_path="${rel_path%.*}"
                zip_name="${base_path//\//__}.zip"
                zip -j "zip/$dir_name/$zip_name" "$file_path"
              done < <(find "$dir_name" -type f)

            else
              echo "No files in: $dir_name"
            fi
          done

      - name: Commit ZIP files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zip/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update ZIP files"
            git push
          fi
